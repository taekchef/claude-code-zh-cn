name: Native Latest Candidate

on:
  push: {}
  workflow_dispatch:
    inputs:
      version:
        description: "Claude Code version to verify. Leave empty to use npm latest."
        required: false
        type: string
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: read

jobs:
  validate:
    name: Validate native candidate workflow
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Run native workflow contract tests
        run: node --test tests/native-latest-workflow.test.js tests/native-candidate-promotion.test.js

  verify:
    name: Verify macOS native candidate
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    # GitHub currently maps macos-15 to the macOS 15 arm64 hosted runner.
    runs-on: macos-15
    timeout-minutes: 45
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install native verification dependency
        run: npm install --no-save node-lief

      - name: Resolve candidate version
        id: version
        shell: bash
        run: |
          INPUT_VERSION="${{ inputs.version || '' }}"
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION="$(npm view @anthropic-ai/claude-code version)"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Verify native candidate
        id: verify
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          JSON_PATH="${RUNNER_TEMP}/native-latest-candidate-${VERSION}.json"
          set +e
          node scripts/verify-upstream-compat.js --baseline "${VERSION}" --skip-latest --native-macos-arm64 --json > "$JSON_PATH"
          STATUS=$?
          set -e
          echo "json_path=${JSON_PATH}" >> "$GITHUB_OUTPUT"
          exit "$STATUS"

      - name: Upload native candidate JSON
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: native-latest-candidate-${{ steps.version.outputs.version }}
          path: ${{ steps.verify.outputs.json_path }}
          if-no-files-found: error

      - name: Explain native candidate boundary failure
        if: failure() && steps.verify.outputs.json_path != ''
        shell: bash
        run: |
          {
            echo "## Native candidate boundary failure"
            node scripts/promote-native-candidate.js --candidate "${{ steps.verify.outputs.json_path }}" 2>&1
          } >> "$GITHUB_STEP_SUMMARY" || true

      - name: Promote native candidate support surfaces
        if: success()
        shell: bash
        run: |
          set +e
          PROMOTE_OUTPUT="$(node scripts/promote-native-candidate.js --candidate "${{ steps.verify.outputs.json_path }}" --write 2>&1)"
          PROMOTE_STATUS=$?
          set -e
          if [ "$PROMOTE_STATUS" -ne 0 ]; then
            {
              echo "## Native candidate boundary failure"
              printf '%s\n' "$PROMOTE_OUTPUT"
            } >> "$GITHUB_STEP_SUMMARY"
            printf '%s\n' "$PROMOTE_OUTPUT"
            exit "$PROMOTE_STATUS"
          fi
          printf '%s\n' "$PROMOTE_OUTPUT"
          node scripts/generate-plugin-support-window.js --write
          node scripts/generate-support-matrix.js
          node scripts/sync-readme-support-window.js --write
          node scripts/sync-doc-derived-counts.js --write
          node scripts/check-support-boundary.js
          node scripts/sync-readme-support-window.js --check
          node scripts/sync-doc-derived-counts.js --check

      - name: Create native candidate closeout PR
        if: success()
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: codex/native-latest-${{ steps.version.outputs.version }}
          draft: true
          delete-branch: true
          commit-message: "chore: promote macOS native ${{ steps.version.outputs.version }}"
          title: "chore: promote macOS native ${{ steps.version.outputs.version }}"
          body: |
            Automated closeout for a verified macOS arm64 native Claude Code candidate.

            This PR is generated only after native extract / patch / repack / --version and display audit pass. It updates the source-of-truth support config plus generated support surfaces, and keeps unverified latest versions outside the public support claim.

            Candidate JSON is attached to the workflow run as `native-latest-candidate-${{ steps.version.outputs.version }}`.
