name: Native Latest Candidate

on:
  push: {}
  workflow_dispatch:
    inputs:
      version:
        description: "Claude Code version to verify. Leave empty to use npm latest."
        required: false
        type: string
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: read

jobs:
  validate:
    name: Validate native candidate workflow
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Run native workflow contract tests
        run: node --test tests/native-latest-workflow.test.js tests/native-candidate-promotion.test.js tests/upstream-text-diff.test.js

  verify:
    name: Verify macOS native candidate
    needs: validate
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    # GitHub currently maps macos-15 to the macOS 15 arm64 hosted runner.
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install native verification dependency
        run: npm install --no-save node-lief

      - name: Resolve candidate version
        id: version
        shell: bash
        run: |
          INPUT_VERSION="${{ inputs.version || '' }}"
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION="$(npm view @anthropic-ai/claude-code version)"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Verify native candidate
        id: verify
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          JSON_PATH="${RUNNER_TEMP}/native-latest-candidate-${VERSION}.json"
          set +e
          node scripts/verify-upstream-compat.js --baseline "${VERSION}" --skip-latest --native-macos-arm64 --json > "$JSON_PATH"
          STATUS=$?
          set -e
          echo "json_path=${JSON_PATH}" >> "$GITHUB_OUTPUT"
          exit "$STATUS"

      - name: Upload native candidate JSON
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: native-latest-candidate-${{ steps.version.outputs.version }}
          path: ${{ steps.verify.outputs.json_path }}
          if-no-files-found: error

      - name: Generate native text diff report
        id: text_diff
        if: always() && steps.version.outputs.version != ''
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TEXT_REPORT_PATH="${RUNNER_TEMP}/native-latest-text-diff-${VERSION}.md"
          set +e
          node scripts/generate-upstream-text-diff.js --to "${VERSION}" --native-macos-arm64 > "$TEXT_REPORT_PATH"
          TEXT_REPORT_STATUS=$?
          set -e
          if [ "$TEXT_REPORT_STATUS" -ne 0 ]; then
            {
              echo "# Upstream text diff: unavailable"
              echo
              echo "Text diff report failed; see workflow logs before treating this candidate as fully reviewed."
            } > "$TEXT_REPORT_PATH"
          fi
          echo "text_report_path=${TEXT_REPORT_PATH}" >> "$GITHUB_OUTPUT"
          {
            echo "## Native latest text diff"
            cat "$TEXT_REPORT_PATH"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload native text diff report
        if: always() && steps.text_diff.outputs.text_report_path != ''
        uses: actions/upload-artifact@v6
        with:
          name: native-latest-text-diff-${{ steps.version.outputs.version }}
          path: ${{ steps.text_diff.outputs.text_report_path }}
          if-no-files-found: error

      - name: Explain native candidate boundary failure
        if: failure() && steps.verify.outputs.json_path != ''
        shell: bash
        run: |
          {
            echo "## Native candidate boundary failure"
            node scripts/promote-native-candidate.js --candidate "${{ steps.verify.outputs.json_path }}" 2>&1
          } >> "$GITHUB_STEP_SUMMARY" || true

      - name: Record native candidate read-only boundary
        if: success()
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          {
            echo "## Native candidate recorded"
            echo
            echo "Native binary patch promotion is disabled because macOS Mach-O rewriting can break the binary signature. This run only uploads evidence artifacts."
            echo
            echo "Candidate JSON artifact: native-latest-candidate-${VERSION}"
            echo "Text diff report artifact: native-latest-text-diff-${VERSION}"
          } >> "$GITHUB_STEP_SUMMARY"
