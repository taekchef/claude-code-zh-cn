name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Run PR preflight
        if: github.event_name == 'pull_request'
        run: bash scripts/preflight.sh --base "${{ github.event.pull_request.base.sha }}" --skip-release-state

      - name: Run main preflight
        if: github.event_name == 'push'
        run: bash scripts/preflight.sh --skip-payload-source --skip-release-state

  windows-install-smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: PowerShell install smoke
        shell: powershell
        run: node --test tests/install-smoke.test.js
