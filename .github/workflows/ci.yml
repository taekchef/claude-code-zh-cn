name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Shell syntax check
        run: |
          bash -n install.sh
          bash -n uninstall.sh
          bash -n plugin/bin/claude-launcher
          bash -n plugin/hooks/session-start
          bash -n plugin/hooks/notification
          bash -n plugin/profile/claude-code-zh-cn.sh

      - name: JavaScript syntax check
        run: |
          node --check bun-binary-io.js
          node --check plugin/bun-binary-io.js
          node --check plugin/patch-cli.js
          node --check scripts/check-payload-sources.js
          node --check scripts/check-support-boundary.js
          node --check scripts/check-translation-sentinels.js
          node --check scripts/generate-support-matrix.js
          node --check scripts/verify-upstream-compat.js

      - name: Check payload source edits
        if: github.event_name == 'pull_request'
        run: node scripts/check-payload-sources.js --base "${{ github.event.pull_request.base.sha }}"

      - name: Check support boundary
        run: node scripts/check-support-boundary.js

      - name: Run tests
        run: node --test tests/*.test.js

      - name: Verify upstream compatibility
        run: node scripts/verify-upstream-compat.js

      - name: Check translation sentinels
        run: |
          TMP_DIR="$(mktemp -d)"
          VERSION="$(node -e 'const config=require("./scripts/upstream-compat.config.json"); process.stdout.write(config.support.npm.stable.representatives.slice(-1)[0]);')"
          TARBALL="$(npm pack @anthropic-ai/claude-code@${VERSION} --silent)"
          tar -xzf "$TARBALL" -C "$TMP_DIR"
          node patch-cli.js "$TMP_DIR/package/cli.js" cli-translations.json >/dev/null
          node scripts/check-translation-sentinels.js "$TMP_DIR/package/cli.js"

      - name: Check support matrix drift
        run: |
          node scripts/generate-support-matrix.js
          git diff --exit-code docs/support-matrix.md

  windows-install-smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: PowerShell install smoke
        shell: powershell
        run: node --test tests/install-smoke.test.js
